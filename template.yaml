AWSTemplateFormatVersion: '2010-09-09'

# aws cloudformation deploy --capabilities CAPABILITY_NAMED_IAM --template-file=cloudformation.yaml --stack-name=hackathon-8x-klemen-cc --region us-east-1

Resources:

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: hackathon-8x.klemen.cc
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: hackathon-8x.klemen.cc
          HostedZoneId: Z02924392YKWLAKI7FH61

  S3bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: hackathon-8x.klemen.cc
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Suspended
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      CorsConfiguration:
        CorsRules:
          - Id: CORS
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']
            AllowedMethods: [GET, HEAD]

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub oac-${S3bucket}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  S3bucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${S3bucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}

  IndexRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub ${AWS::StackName}-index-rewrite
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite directory-style URIs to their index.html object
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri.endsWith('/')) {
            request.uri = uri + 'index.html';
          } else if (!uri.split('/').pop().includes('.')) {
            request.uri = uri + '/index.html';
          }
          return request;
        }

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: hackathon-8x.klemen.cc — static site
        DefaultRootObject: index.html
        Aliases:
          - hackathon-8x.klemen.cc
        Origins:
          - Id: !Sub s3-origin-${S3bucket}
            DomainName: !GetAtt S3bucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref OriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: !Sub s3-origin-${S3bucket}
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6   # CachingOptimized
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [HEAD, GET]
          CachedMethods: [HEAD, GET]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt IndexRewriteFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          - ErrorCachingMinTTL: 60
            ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
          - ErrorCachingMinTTL: 60
            ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
        HttpVersion: http2
        ViewerCertificate:
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
          AcmCertificateArn: !Ref Certificate

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z02924392YKWLAKI7FH61
      Name: hackathon-8x.klemen.cc
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2   # CloudFront static hosted zone ID
